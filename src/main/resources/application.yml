server:
  port: 8080

spring:
  application:
    name: sensei

  datasource:
    url: jdbc:mysql://localhost:3306/sensei_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # OAuth2 disabled for local dev (uncomment and fill for production)
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         google:
  #           client-id: your-google-client-id
  #           client-secret: your-google-client-secret
  #           scope: openid, profile, email

# JWT Configuration
app:
  jwt:
    secret: sensei-dev-secret-key-minimum-256-bits-long-for-hmac-sha256-algorithm
    expiration-ms: 86400000  # 24 hours

# AWS S3 Configuration (use placeholder for local dev)
aws:
  s3:
    bucket-name: sensei-uploads
    region: ap-south-1
    access-key: placeholder
    secret-key: placeholder

# Razorpay Configuration (test mode - get free keys from dashboard.razorpay.com)
razorpay:
  key-id: rzp_test_placeholder
  key-secret: placeholder
  webhook-secret: placeholder
